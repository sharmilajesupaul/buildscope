name: release

on:
  push:
    tags:
      - "v0.1.*"

permissions:
  contents: write
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Run frontend tests
        run: npm --prefix ui test

      - name: Refresh embedded UI bundle
        run: ./scripts/refresh-embedded-ui.sh

      - name: Ensure embedded UI bundle is committed
        run: git diff --exit-code -- cli/internal/embeddedui/dist

      - name: Run Go tests
        run: go -C cli test ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build release archive
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          rm -rf dist
          mkdir -p dist
          ./scripts/build-release.sh "${{ github.ref_name }}" "${{ matrix.goos }}" "${{ matrix.goarch }}" dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > "buildscope_${GITHUB_REF_NAME#v}_checksums.txt"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: BuildScope ${{ github.ref_name }}
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          generate_release_notes: true
          files: dist/*

  update_homebrew:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Render Homebrew formula
        run: |
          ./scripts/render-homebrew-formula.sh \
            "${GITHUB_REF_NAME}" \
            "${GITHUB_SHA}" \
            Formula/buildscope.rb

      - name: Open formula update PR
        id: open_homebrew_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            Formula/buildscope.rb
          branch: automation/homebrew-${{ github.ref_name }}
          commit-message: "release: update Homebrew formula for ${{ github.ref_name }}"
          delete-branch: true
          title: "release: update Homebrew formula for ${{ github.ref_name }}"
          body: |
            Automated Homebrew formula update for `${{ github.ref_name }}`.

      - name: Report formula update branch
        if: steps.open_homebrew_pr.outcome == 'failure'
        run: |
          echo "::warning::GitHub Actions could not open the Homebrew PR in this repo."
          echo "::warning::Open it manually at https://github.com/${GITHUB_REPOSITORY}/pull/new/automation/homebrew-${GITHUB_REF_NAME}"
